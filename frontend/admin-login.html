<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <link rel="stylesheet"
    href="admin-login.css">

    <script src="https://kit.fontawesome.com/59f35df058.js"
    crossorigin="anonymous"></script>

</head>

<body>

    <!-- ================= LOGIN BOX ================= -->

    <div class="login-box">

        <h1>
            ADMIN LOGIN
        </h1>

        <form id="login-form">

            <input
            type="email"
            placeholder="Admin Email"
            required>

            <input
            type="password"
            placeholder="Password"
            required>

            <button type="submit">

                Login

            </button>

        </form>

    </div>

    <script src="admin-login.js"></script>

</body>

</html>
